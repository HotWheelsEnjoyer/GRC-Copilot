<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f5f5f5; }
        .user { text-align: right; color: blue; margin: 5px 0; }
        .bot { text-align: left; color: green; margin: 5px 0; }
        input { width: 85%; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>GRC Chatbot</h2>
    <div id="chat"></div>
    
    <form id="form" onsubmit="sendMessage(event)">
        {% csrf_token %}
        <input type="text" id="message" placeholder="Ask something...">
        <button type="submit">Send</button>
    </form>

    <script>
        function sendMessage(event) {
            event.preventDefault();
            const msg = document.getElementById('message').value;
            if (!msg.trim()) return;
            
            document.getElementById('chat').innerHTML += '<div class="user"><b>You:</b> ' + msg + '</div>';
            
            const formData = new FormData();
            formData.append('message', msg);
            formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
            
            fetch('', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(d => {
                document.getElementById('chat').innerHTML += '<div class="bot"><b>Bot:</b> ' + d.response + '</div>';
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            });
            
            document.getElementById('message').value = '';
        }
    </script>
</body>
</html>
